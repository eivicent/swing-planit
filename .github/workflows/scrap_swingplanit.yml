name: Scrape SwingPlanIt

on:
  schedule:
    - cron: "0 0 * * *" # Run every day at 00:00 UTC
  workflow_dispatch:

jobs:
  run_script:
    runs-on: ubuntu-latest
    
    permissions: write-all
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
  
      - uses: r-lib/actions/setup-r@v2
      - name: Install dependencies
        run: Rscript -e "install.packages(c('rvest', 'dplyr', 'tibble', 'stringr', 'purrr', 'readr', 'tidyr'))"

      - name: Run scraper
        run: Rscript scrape_swing_planit.R

      - name: Build metrics datasets
        run: Rscript build_metrics.R
        
      - name: Commit files
        run: |
          git add --all
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config --local user.name github-actions
          git config --local user.email "actions@github.com"
          git commit -m "Daily scrape and metrics update on $(date -u +'%Y-%m-%d')"
          git push origin main
        env:
          REPO_KEY: ${{secrets.GITHUB_TOKEN}}
          username: github-actions